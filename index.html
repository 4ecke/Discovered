<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Discovered</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --surface: #1c1c1c;
    --border: #2a2a2a;
    --border2: #383838;
    --text: #f0ede8;
    --text2: #9a9590;
    --text3: #5a5550;
    --accent: #c8f060;
    --accent-light: rgba(200,240,96,0.08);
    --red: #ff5c5c;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* LOGO */
  .logo {
    position: fixed;
    top: 28px;
    left: 32px;
    display: flex;
    align-items: center;
    gap: 9px;
    z-index: 100;
    text-decoration: none;
  }
  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .logo-icon svg { width: 15px; height: 15px; fill: white; }
  .logo-text {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  /* API KEY BUTTON */
  .key-btn {
    position: fixed;
    top: 30px;
    right: 32px;
    z-index: 100;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Geist', sans-serif;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    transition: all 0.15s;
  }
  .key-btn:hover { color: var(--text2); border-color: var(--border2); background: var(--surface); }
  .key-btn.set { color: var(--accent); border-color: rgba(45,90,61,0.3); }

  /* KEY MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,24,20,0.4);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px 32px;
    width: 380px;
    max-width: calc(100vw - 40px);
    animation: popIn 0.2s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(6px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-bottom: 6px;
  }
  .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
  .modal input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 10px 13px;
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.15s;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 8px; }
  .modal-save {
    flex: 1;
    padding: 9px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .modal-save:hover { opacity: 0.88; }
  .modal-cancel {
    padding: 9px 16px;
    background: none;
    border: 1px solid var(--border2);
    border-radius: 8px;
    font-family: 'Geist', sans-serif;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
  }
  .modal-cancel:hover { background: var(--bg); }
  .modal-link { font-size: 12px; color: var(--text3); margin-top: 10px; display: block; }
  .modal-link a { color: var(--accent); text-decoration: none; }

  /* MAIN LAYOUT */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 20px 60px;
    position: relative;
    z-index: 1;
    transition: justify-content 0.4s ease;
  }
  main.has-results {
    justify-content: flex-start;
    padding-top: 110px;
  }

  /* SEARCH AREA */
  .search-wrap {
    width: 100%;
    max-width: 560px;
    transition: all 0.4s ease;
  }

  .search-eyebrow {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--text3);
    text-align: center;
    margin-bottom: 20px;
    opacity: 1;
    transition: opacity 0.3s ease, height 0.3s ease;
  }
  .has-results .search-eyebrow { opacity: 0; height: 0; margin: 0; overflow: hidden; }

  .search-box {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 14px;
    box-shadow: 0 2px 20px rgba(26,24,20,0.06), 0 1px 4px rgba(26,24,20,0.04);
    transition: box-shadow 0.2s ease;
  }
  .search-box:focus-within {
    box-shadow: 0 4px 28px rgba(26,24,20,0.1), 0 1px 4px rgba(26,24,20,0.04);
    border-color: var(--border2);
  }

  .search-input-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 20px;
  }
  .search-icon { color: var(--text3); flex-shrink: 0; }
  .search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    font-family: 'Geist', sans-serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--text);
  }
  .search-input::placeholder { color: var(--text3); }
  .search-clear {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text3);
    padding: 4px;
    display: none;
    border-radius: 4px;
    transition: color 0.15s;
    line-height: 1;
    font-size: 18px;
  }
  .search-clear:hover { color: var(--text); }
  .search-clear.visible { display: block; }

  /* SUGGESTIONS DROPDOWN */
  .suggestions {
    border-top: 1px solid var(--border);
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.2s ease;
  }
  .suggestions.open { max-height: 320px; }

  .suggestion-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 20px;
    cursor: pointer;
    transition: background 0.1s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .suggestion-item:hover, .suggestion-item.focused { background: var(--bg); }
  .suggestion-item:last-child { border-radius: 0 0 14px 14px; }

  .suggestion-img {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    object-fit: cover;
    background: var(--bg2);
    flex-shrink: 0;
  }
  .suggestion-img-placeholder {
    width: 36px;
    height: 36px;
    border-radius: 4px;
    background: var(--bg2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 14px;
  }
  .suggestion-name {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
  }
  .suggestion-artist {
    font-size: 12px;
    color: var(--text2);
    margin-top: 1px;
  }
  .suggestion-loading {
    padding: 16px 20px;
    font-size: 13px;
    color: var(--text3);
    text-align: center;
  }

  /* NO KEY WARNING */
  .no-key-hint {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
    color: var(--text3);
  }
  .no-key-hint span { color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }

  /* RESULTS */
  .results-wrap {
    width: 100%;
    max-width: 560px;
    margin-top: 24px;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .results-header {
    font-size: 12px;
    color: var(--text3);
    font-weight: 400;
    letter-spacing: 0.3px;
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .results-header em {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--text2);
    font-size: 13px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
    animation: fadeUp 0.3s ease both;
  }
  .result-card:nth-child(1) { animation-delay: 0.03s; }
  .result-card:nth-child(2) { animation-delay: 0.06s; }
  .result-card:nth-child(3) { animation-delay: 0.09s; }
  .result-card:nth-child(4) { animation-delay: 0.12s; }
  .result-card:nth-child(5) { animation-delay: 0.15s; }
  .result-card:nth-child(6) { animation-delay: 0.18s; }
  .result-card:nth-child(7) { animation-delay: 0.21s; }
  .result-card:nth-child(8) { animation-delay: 0.24s; }
  .result-card:nth-child(9) { animation-delay: 0.27s; }
  .result-card:nth-child(10) { animation-delay: 0.3s; }
  .result-card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(26,24,20,0.05); }

  .result-num {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--text3);
    font-style: italic;
    min-width: 18px;
    padding-top: 1px;
  }
  .result-img {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    object-fit: cover;
    background: var(--bg2);
    flex-shrink: 0;
  }
  .result-img-placeholder {
    width: 44px;
    height: 44px;
    border-radius: 6px;
    background: var(--bg2);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 18px;
  }
  .result-info { flex: 1; min-width: 0; }
  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .result-artist {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }
  .result-why {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
    line-height: 1.5;
    font-style: italic;
  }
  .result-match {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-light);
    padding: 3px 8px;
    border-radius: 99px;
    white-space: nowrap;
    align-self: flex-start;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .results-loading {
    text-align: center;
    padding: 40px 0;
    color: var(--text3);
    font-size: 14px;
  }
  .results-loading .spin {
    width: 24px; height: 24px;
    border: 1.5px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    text-align: center;
    padding: 20px;
    color: var(--red);
    font-size: 13px;
    background: #fdf2f1;
    border-radius: 10px;
    border: 1px solid rgba(192,57,43,0.15);
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    color: var(--text3);
    position: relative;
    z-index: 1;
  }
</style>
</head>
<body>

<!-- LOGO -->
<a class="logo" href="#">
  <span class="logo-text">Discovered</span>
</a>

<!-- API KEY BUTTON -->
<button class="key-btn" id="key-btn" onclick="openModal()">⚙ api key</button>

<!-- API KEY MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-title">Last.fm API key</div>
    <div class="modal-sub">Paste your Last.fm API key below. It's saved to your browser and never sent anywhere else.</div>
    <input type="password" id="modal-key-input" placeholder="Paste your API key here">
    <div class="modal-btns">
      <button class="modal-save" onclick="saveKey()">Save</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
    <span class="modal-link">Don't have one? <a href="https://www.last.fm/api/account/create" target="_blank">Get it free at last.fm/api</a></span>
  </div>
</div>

<!-- MAIN -->
<main id="main">
  <div class="search-wrap">
    <div class="search-eyebrow">find music that sounds like yours</div>

    <div class="search-box" id="search-box">
      <div class="search-input-row">
        <svg class="search-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          class="search-input"
          id="search-input"
          type="text"
          placeholder="type a song name..."
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
          oninput="handleInput(this.value)"
          onkeydown="handleKeydown(event)"
        >
        <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
      </div>
      <div class="suggestions" id="suggestions"></div>
    </div>

    <div class="no-key-hint" id="no-key-hint" style="display:none">
      Add your <span onclick="openModal()">Last.fm API key</span> to get started
    </div>
  </div>

  <div id="results-area"></div>
</main>

<footer>powered by Last.fm · data from real human listening patterns</footer>

<script>
const LASTFM_BASE = 'https://ws.audioscrobbler.com/2.0/';
let searchTimeout = null;
let focusedIndex = -1;
let currentSuggestions = [];
let selectedTrack = null;

// ─── KEY MANAGEMENT ───────────────────────────────────────────────────────────
function getKey() { return localStorage.getItem('discovered_lastfm_key') || ''; }

function saveKey() {
  const val = document.getElementById('modal-key-input').value.trim();
  if (!val) return;
  localStorage.setItem('discovered_lastfm_key', val);
  updateKeyBtn();
  closeModal();
  document.getElementById('no-key-hint').style.display = 'none';
}

function updateKeyBtn() {
  const btn = document.getElementById('key-btn');
  if (getKey()) { btn.textContent = '⚙ api key'; btn.classList.add('set'); }
  else { btn.textContent = '⚙ api key'; btn.classList.remove('set'); }
}

function openModal() {
  document.getElementById('modal-key-input').value = getKey();
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => document.getElementById('modal-key-input').focus(), 100);
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ─── SEARCH INPUT ─────────────────────────────────────────────────────────────
function handleInput(val) {
  const clearBtn = document.getElementById('search-clear');
  clearBtn.classList.toggle('visible', val.length > 0);

  if (!val.trim()) { closeSuggestions(); return; }
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => searchTracks(val), 280);
}

function handleKeydown(e) {
  const items = document.querySelectorAll('.suggestion-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    focusedIndex = Math.min(focusedIndex + 1, items.length - 1);
    updateFocus(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    focusedIndex = Math.max(focusedIndex - 1, -1);
    updateFocus(items);
  } else if (e.key === 'Enter') {
    if (focusedIndex >= 0 && currentSuggestions[focusedIndex]) {
      selectTrack(currentSuggestions[focusedIndex]);
    }
  } else if (e.key === 'Escape') {
    clearSearch();
  }
}

function updateFocus(items) {
  items.forEach((item, i) => item.classList.toggle('focused', i === focusedIndex));
}

function clearSearch() {
  document.getElementById('search-input').value = '';
  document.getElementById('search-clear').classList.remove('visible');
  closeSuggestions();
  document.getElementById('results-area').innerHTML = '';
  document.getElementById('main').classList.remove('has-results');
  selectedTrack = null;
  focusedIndex = -1;
}

// ─── LAST.FM SEARCH ───────────────────────────────────────────────────────────
async function searchTracks(query) {
  const key = getKey();
  if (!key) { document.getElementById('no-key-hint').style.display = 'block'; return; }

  showSuggestionsLoading();

  try {
    const url = LASTFM_BASE + '?method=track.search&track=' + encodeURIComponent(query) + '&api_key=' + key + '&format=json&limit=6';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Network error ' + res.status);
    const data = await res.json();

    if (data.error) throw new Error('Last.fm: ' + data.message + ' (code ' + data.error + ')');

    const raw = data.results && data.results.trackmatches && data.results.trackmatches.track;
    if (!raw) { showSuggestionError('No results found'); return; }
    const tracks = Array.isArray(raw) ? raw : [raw];
    currentSuggestions = tracks;
    renderSuggestions(currentSuggestions);
  } catch(e) {
    showSuggestionError(e.message || 'Something went wrong');
  }
}

function showSuggestionError(msg) {
  const el = document.getElementById('suggestions');
  el.innerHTML = '<div class="suggestion-loading" style="color:#c0392b">' + msg + '</div>';
  el.classList.add('open');
}

function showSuggestionsLoading() {
  const el = document.getElementById('suggestions');
  el.innerHTML = '<div class="suggestion-loading">searching...</div>';
  el.classList.add('open');
}

function renderSuggestions(tracks) {
  const el = document.getElementById('suggestions');
  if (!tracks.length) { el.innerHTML = '<div class="suggestion-loading">no results</div>'; el.classList.add('open'); return; }

  el.innerHTML = tracks.map((t, i) => {
    const img = getTrackImg(t, 'small');
    const imgEl = img
      ? `<img class="suggestion-img" src="${img}" alt="" onerror="this.style.display='none'">`
      : `<div class="suggestion-img-placeholder">♪</div>`;
    return `<button class="suggestion-item" onclick="selectTrack(currentSuggestions[${i}])">
      ${imgEl}
      <div>
        <div class="suggestion-name">${escHtml(t.name)}</div>
        <div class="suggestion-artist">${escHtml(t.artist)}</div>
      </div>
    </button>`;
  }).join('');
  el.classList.add('open');
  focusedIndex = -1;
}

function closeSuggestions() {
  const el = document.getElementById('suggestions');
  el.classList.remove('open');
  el.innerHTML = '';
  currentSuggestions = [];
  focusedIndex = -1;
}

// ─── SELECT & GET SIMILAR ─────────────────────────────────────────────────────
function selectTrack(track) {
  selectedTrack = track;
  document.getElementById('search-input').value = `${track.name} — ${track.artist}`;
  document.getElementById('search-clear').classList.add('visible');
  closeSuggestions();
  getSimilar(track.name, track.artist);
}

async function getSimilar(trackName, artist) {
  const key = getKey();
  if (!key) return;

  document.getElementById('main').classList.add('has-results');
  document.getElementById('results-area').innerHTML = `
    <div class="results-wrap">
      <div class="results-loading"><div class="spin"></div>finding similar tracks...</div>
    </div>`;

  try {
    // Get similar tracks
    const url = LASTFM_BASE + '?method=track.getSimilar&track=' + encodeURIComponent(trackName) + '&artist=' + encodeURIComponent(artist) + '&api_key=' + key + '&format=json&limit=10&autocorrect=1';
    const res = await fetch(url);
    if (!res.ok) throw new Error('Network error ' + res.status);
    const data = await res.json();

    if (data.error) throw new Error('Last.fm: ' + data.message + ' (code ' + data.error + ')');

    const tracks = (data.similartracks && data.similartracks.track) || [];
    if (!tracks.length) {
      document.getElementById('results-area').innerHTML = `
        <div class="results-wrap">
          <div class="error-msg">No similar tracks found for this song. Try another.</div>
        </div>`;
      return;
    }

    // Fetch album art for each track in parallel
    const enriched = await Promise.all(tracks.slice(0, 10).map(t => enrichTrack(t, key)));
    renderResults(enriched, trackName, artist);

  } catch(e) {
    document.getElementById('results-area').innerHTML = `
      <div class="results-wrap">
        <div class="error-msg">${e.message || 'Something went wrong. Check your API key.'}</div>
      </div>`;
  }
}

async function enrichTrack(track, key) {
  try {
    const url = `${LASTFM_BASE}?method=track.getInfo&track=${encodeURIComponent(track.name)}&artist=${encodeURIComponent(track.artist.name)}&api_key=${key}&format=json&autocorrect=1`;
    const res = await fetch(url);
    const data = await res.json();
    track._info = data.track || null;
  } catch(e) { track._info = null; }
  return track;
}

// ─── RENDER RESULTS ───────────────────────────────────────────────────────────
function renderResults(tracks, sourceName, sourceArtist) {
  const pct = t => Math.round((parseFloat(t.match) || 0) * 100);

  const cards = tracks.map((t, i) => {
    const artistName = t.artist?.name || t.artist || '';
    const img = getEnrichedImg(t) || getTrackImg(t, 'medium');
    const imgEl = img
      ? `<img class="result-img" src="${img}" alt="" onerror="this.parentElement.querySelector('.result-img-placeholder') && (this.style.display='none')">`
      : `<div class="result-img-placeholder">♪</div>`;

    const matchPct = pct(t);
    const matchLabel = matchPct >= 80 ? 'very similar' : matchPct >= 50 ? 'similar' : matchPct >= 25 ? 'related' : 'connected';

    const tags = t._info?.toptags?.tag?.slice(0,3).map(tg => tg.name).filter(Boolean) || [];
    const why = buildWhy(t, tags, sourceArtist);

    return `<div class="result-card">
      <div class="result-num">${i + 1}</div>
      ${imgEl}
      <div class="result-info">
        <div class="result-title">${escHtml(t.name)}</div>
        <div class="result-artist">${escHtml(artistName)}</div>
        ${why ? `<div class="result-why">${why}</div>` : ''}
      </div>
      ${matchPct > 0 ? `<div class="result-match">${matchLabel}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('results-area').innerHTML = `
    <div class="results-wrap">
      <div class="results-header">10 tracks similar to <em>${escHtml(sourceName)}</em> by <em>${escHtml(sourceArtist)}</em></div>
      ${cards}
    </div>`;
}

function buildWhy(track, tags, sourceArtist) {
  const parts = [];
  const artistName = track.artist?.name || '';
  if (tags.length) parts.push(`tagged ${tags.map(t => t.toLowerCase()).join(', ')}`);
  if (track._info?.listeners) {
    const n = parseInt(track._info.listeners);
    if (n > 0) parts.push(`${formatNum(n)} listeners`);
  }
  return parts.length ? parts.join(' · ') : '';
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getTrackImg(track, size) {
  const images = track.image || [];
  const sizeMap = { small: 1, medium: 2, large: 3 };
  const idx = sizeMap[size] || 1;
  return images[idx]?.['#text'] || images[0]?.['#text'] || '';
}

function getEnrichedImg(track) {
  if (!track._info) return null;
  const images = track._info.album?.image || track._info.image || [];
  for (let i = images.length - 1; i >= 0; i--) {
    if (images[i]['#text']) return images[i]['#text'];
  }
  return null;
}

function formatNum(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return Math.round(n / 1000) + 'k';
  return n.toString();
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  updateKeyBtn();
  if (!getKey()) document.getElementById('no-key-hint').style.display = 'block';
  document.getElementById('search-input').focus();

  // Close suggestions on outside click
  document.addEventListener('click', e => {
    if (!document.getElementById('search-box').contains(e.target)) closeSuggestions();
  });

  // Enter in modal
  document.getElementById('modal-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKey();
  });
}

init();
</script>
